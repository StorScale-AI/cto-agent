# CTO Agent Auto-Fix Caller
# Drop this file into any repo at .github/workflows/cto-auto-fix.yml
# Update the "workflows" list to match your CI workflow name(s).
#
# Required org-level secrets:
#   - ANTHROPIC_API_KEY
#   - GH_PAT (with repo + actions + workflow scopes)
#   - SLACK_WEBHOOK_URL (optional)

name: CTO Auto-Fix

on:
  workflow_run:
    workflows: ["CI"]  # ← Change this to match your CI workflow name
    types: [completed]

jobs:
  auto-fix:
    if: github.event.workflow_run.conclusion == 'failure'
    uses: StorScale-AI/cto-agent/.github/workflows/auto-fix.yml@main
    with:
      repo: ${{ github.repository }}
      run_id: ${{ github.event.workflow_run.id }}
      workflow_name: ${{ github.event.workflow_run.name }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_PAT: ${{ secrets.GH_PAT }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
