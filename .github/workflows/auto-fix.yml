name: CTO Auto-Fix

on:
  workflow_call:
    inputs:
      repo:
        description: 'Repository that failed (org/name format)'
        required: true
        type: string
      run_id:
        description: 'Failed workflow run ID'
        required: true
        type: number
      workflow_name:
        description: 'Name of the CI workflow that failed'
        required: true
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      GH_PAT:
        required: true
      SLACK_WEBHOOK_URL:
        required: false

concurrency:
  group: cto-fix-${{ inputs.repo }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  TARGET_REPO: ${{ inputs.repo }}
  TARGET_RUN_ID: ${{ inputs.run_id }}
  TARGET_WORKFLOW: ${{ inputs.workflow_name }}

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      actions: read
    steps:
      # ── Loop Guard ──────────────────────────────────────────────
      - name: Check for fix loop
        id: loop-guard
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          COMMIT_MSG=$(gh api "repos/${TARGET_REPO}/actions/runs/${TARGET_RUN_ID}" \
            --jq '.head_commit.message // ""')
          COMMIT_AUTHOR=$(gh api "repos/${TARGET_REPO}/actions/runs/${TARGET_RUN_ID}" \
            --jq '.head_commit.author.name // ""')

          if echo "$COMMIT_MSG" | grep -q '\[cto-fix\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=Last commit was a CTO auto-fix — skipping to prevent loop" >> "$GITHUB_OUTPUT"
          elif echo "$COMMIT_AUTHOR" | grep -qi 'cto-agent'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=Last commit by CTO agent — skipping to prevent loop" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Escalate if loop detected
        if: steps.loop-guard.outputs.skip == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          LOOP_REASON: ${{ steps.loop-guard.outputs.reason }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            PAYLOAD=$(jq -n --arg text "CTO Agent: Auto-fix loop detected in ${TARGET_REPO}. ${LOOP_REASON}. Manual intervention needed. Run: https://github.com/${TARGET_REPO}/actions/runs/${TARGET_RUN_ID}" '{text: $text}')
            curl -s -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' -d "$PAYLOAD"
          fi
          echo "::warning::${LOOP_REASON}"

      # ── Download Failure Logs ───────────────────────────────────
      - name: Download failure logs
        if: steps.loop-guard.outputs.skip != 'true'
        id: logs
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api "repos/${TARGET_REPO}/actions/runs/${TARGET_RUN_ID}/logs" > logs.zip || true
          if [ -f logs.zip ]; then
            unzip -o logs.zip -d run-logs/ 2>/dev/null || true
            cat run-logs/*.txt > failure-log.txt 2>/dev/null || true
          fi
          gh api "repos/${TARGET_REPO}/actions/runs/${TARGET_RUN_ID}/annotations" \
            --jq '.[].message' > annotations.txt 2>/dev/null || true
          gh run view "${TARGET_RUN_ID}" --repo "${TARGET_REPO}" --log-failed > failed-log.txt 2>/dev/null || true

          # Sanitize logs: strip ANSI codes, prompt injection patterns, truncate
          cat failure-log.txt failed-log.txt 2>/dev/null | \
            sed 's/\x1b\[[0-9;]*m//g' | \
            sed '/^[[:space:]]*<\(system\|user\|assistant\|human\|SYSTEM\|USER\|ASSISTANT\)/d' | \
            sed '/ignore previous instructions/Id' | \
            sed '/you are now/Id' | \
            sed '/disregard.*above/Id' | \
            sed '/override.*system/Id' | \
            head -500 > combined-log.txt 2>/dev/null || true
          echo "log_size=$(wc -c < combined-log.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"

      # ── Clone CTO Agent (for pattern matchers) ──────────────────
      # T1.4: Pinned to commit SHAs
      - name: Checkout CTO agent
        if: steps.loop-guard.outputs.skip != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: StorScale-AI/cto-agent
          token: ${{ secrets.GH_PAT }}
          path: cto-agent

      - name: Setup Node.js
        if: steps.loop-guard.outputs.skip != 'true'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install and build CTO agent
        if: steps.loop-guard.outputs.skip != 'true'
        working-directory: cto-agent
        run: npm ci && npm run build

      # ── Fast Path: Pattern Matching ─────────────────────────────
      - name: Run pattern matchers
        if: steps.loop-guard.outputs.skip != 'true'
        id: patterns
        working-directory: cto-agent
        run: |
          node --input-type=module -e "
            import { matchPatterns, matchAllPatterns } from './dist/patterns/index.js';
            import { readFileSync } from 'fs';

            const logText = readFileSync('../combined-log.txt', 'utf8');
            const annotations = readFileSync('../annotations.txt', 'utf8').split('\n').filter(Boolean);

            const result = matchPatterns(logText, annotations);
            const allResults = matchAllPatterns(logText, annotations);

            console.log(JSON.stringify({
              matched: result !== null,
              result,
              allResults: allResults.map(r => ({ name: r.patternName, confidence: r.confidence }))
            }));
          " > ../pattern-result.json

          MATCHED=$(node -e "console.log(JSON.parse(require('fs').readFileSync('../pattern-result.json','utf8')).matched)")
          echo "matched=${MATCHED}" >> "$GITHUB_OUTPUT"

      # ── T2.14: Escalation-only check ──────────────────────────
      - name: Check escalation-only
        if: steps.loop-guard.outputs.skip != 'true'
        id: escalation-check
        run: |
          if [ -f ../pattern-result.json ]; then
            ESCALATE_ONLY=$(node -e "try{const d=JSON.parse(require('fs').readFileSync('../pattern-result.json','utf8'));console.log(d.result?.escalateOnly===true?'true':'false')}catch{console.log('false')}")
            echo "escalate_only=${ESCALATE_ONLY}" >> "$GITHUB_OUTPUT"
          else
            echo "escalate_only=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack on escalation-only
        if: steps.loop-guard.outputs.skip != 'true' && steps.escalation-check.outputs.escalate_only == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            DESC=$(node -e "try{const d=JSON.parse(require('fs').readFileSync('../pattern-result.json','utf8'));console.log(d.result?.description||'Unknown')}catch{console.log('Unknown')}")
            PAYLOAD=$(jq -n --arg text "CTO Agent: Escalation-only pattern in *${TARGET_REPO}* — ${DESC}. Manual intervention required.\nhttps://github.com/${TARGET_REPO}/actions/runs/${TARGET_RUN_ID}" '{attachments: [{color: "danger", text: $text}]}')
            curl -s -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' -d "$PAYLOAD"
          fi

      # ── Clone Target Repo ───────────────────────────────────────
      - name: Checkout target repo
        if: steps.loop-guard.outputs.skip != 'true' && steps.escalation-check.outputs.escalate_only != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ inputs.repo }}
          token: ${{ secrets.GH_PAT }}
          path: target-repo

      # ── Apply Fix: Claude Code ──────────────────────────────────
      # T1.2: Path restrictions via --disallowedTools
      # T1.7: Full TDD prompt from fix-ci-failure.md
      - name: Claude Code auto-fix
        if: steps.loop-guard.outputs.skip != 'true' && steps.escalation-check.outputs.escalate_only != 'true'
        id: claude-fix
        uses: anthropics/claude-code-action@d3a8d1736a61af74bee88bcac0182c49be969839 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the CTO Agent for StorScale, an automated system architect that fixes CI failures.

            Repository: ${{ inputs.repo }}
            Workflow: ${{ inputs.workflow_name }}

            Read the file combined-log.txt and annotations.txt in the parent directory for failure details.
            Also read pattern-result.json for automated diagnosis (if available).

            ## Constraints (HARD RULES)
            1. Max 5 files changed — if the fix requires more, create ESCALATE.txt
            2. Max 100 lines added/removed — if the fix requires more, create ESCALATE.txt
            3. NEVER modify: .env files, .github/ workflows, package.json, package-lock.json, *.sql migrations, auth modules, middleware files
            4. NEVER hardcode API keys, tokens, or secrets
            5. NEVER delete existing tests — only add or modify
            6. Every fix SHOULD include a regression test

            ## Process (TDD)
            1. Read the failure logs to understand the root cause
            2. Read the relevant source files
            3. Write a test that reproduces the failure condition (if applicable)
            4. Write the minimal fix that makes the test pass
            5. Run the test command to verify your fix works before finishing

            ## Common Fixes
            - console.log in production code → replace with logger.info/warn/error
            - Env var name mismatch in tests → update test to match agent config
            - Secret scanner false positive → cannot fix (restricted file), create ESCALATE.txt
            - Broken require path → fix the relative path

            If you cannot fix this safely, create a file called ESCALATE.txt with the reason.
            Do NOT commit — the workflow handles commits. Just make the file changes.
          claude_args: '--allowedTools Read,Write,Edit,Glob,Grep --max-turns 25'

      # ── T1.1: Run Tests Before Push ─────────────────────────────
      - name: Validate fix with tests
        if: steps.loop-guard.outputs.skip != 'true'
        id: test-fix
        working-directory: target-repo
        run: |
          # Check for escalation first
          if [ -f ESCALATE.txt ]; then
            echo "tests_passed=false" >> "$GITHUB_OUTPUT"
            echo "reason=Claude escalated: $(cat ESCALATE.txt)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if there are changes
          if git diff --quiet && git diff --cached --quiet; then
            echo "tests_passed=false" >> "$GITHUB_OUTPUT"
            echo "reason=No changes to validate" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Detect test command from package.json
          TEST_CMD=""
          if [ -f package.json ]; then
            TEST_CMD=$(node -e "try{const p=JSON.parse(require('fs').readFileSync('package.json','utf8'));console.log(p.scripts?.test||'')}catch{}" 2>/dev/null)
          fi

          # Also check for nested package.json (monorepo pattern)
          for dir in . packages/api storscale-agents; do
            if [ -f "$dir/package.json" ] && [ -z "$TEST_CMD" ]; then
              TEST_CMD=$(node -e "try{const p=JSON.parse(require('fs').readFileSync('$dir/package.json','utf8'));console.log(p.scripts?.test||'')}catch{}" 2>/dev/null)
            fi
          done

          # Run TypeScript check if tsconfig exists
          if [ -f tsconfig.json ]; then
            echo "Running TypeScript check..."
            npx tsc --noEmit --skipLibCheck 2>&1 | tail -20 || true
          fi

          # Run tests if available
          if [ -n "$TEST_CMD" ] && [ "$TEST_CMD" != "echo \"Error: no test specified\" && exit 1" ]; then
            echo "Running tests: npm test"
            npm install --ignore-scripts 2>/dev/null || true
            npm test 2>&1 | tail -30
            if [ $? -eq 0 ]; then
              echo "tests_passed=true" >> "$GITHUB_OUTPUT"
            else
              echo "tests_passed=false" >> "$GITHUB_OUTPUT"
              echo "reason=Tests failed after applying fix" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            echo "No test command found — skipping test validation"
            echo "tests_passed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── T3.17: Secret scan before push ────────────────────────────
      - name: Scan for secrets in diff
        if: steps.loop-guard.outputs.skip != 'true' && steps.test-fix.outputs.tests_passed == 'true'
        id: secret-scan
        working-directory: target-repo
        run: |
          # Check for common secret patterns in the diff
          DIFF=$(git diff HEAD)
          PATTERNS=(
            'AKIA[0-9A-Z]{16}'          # AWS access key
            'sk-[a-zA-Z0-9]{48}'        # OpenAI API key
            'sk-ant-[a-zA-Z0-9-]{90,}'  # Anthropic API key
            'ghp_[a-zA-Z0-9]{36}'       # GitHub PAT
            'ghs_[a-zA-Z0-9]{36}'       # GitHub App token
            'xoxb-[0-9]{10,}'           # Slack bot token
            'xoxp-[0-9]{10,}'           # Slack user token
            'sk_live_[a-zA-Z0-9]{24,}'  # Stripe live key
            'rk_live_[a-zA-Z0-9]{24,}'  # Stripe restricted key
            'SG\.[a-zA-Z0-9_-]{22}\.'   # SendGrid
            'eyJ[a-zA-Z0-9_-]{20,}\.'   # JWT token (long)
          )

          FOUND=false
          for PATTERN in "${PATTERNS[@]}"; do
            if echo "$DIFF" | grep -qE "$PATTERN"; then
              echo "::error::Potential secret detected matching pattern: ${PATTERN:0:10}..."
              FOUND=true
            fi
          done

          if [ "$FOUND" = "true" ]; then
            echo "secrets_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "secrets_found=false" >> "$GITHUB_OUTPUT"
          fi

      # ── T1.5: Push fix (branch for novel, main for pattern-matched) ──
      - name: Push fix
        if: steps.loop-guard.outputs.skip != 'true' && steps.test-fix.outputs.tests_passed == 'true' && steps.secret-scan.outputs.secrets_found != 'true'
        id: push
        working-directory: target-repo
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PATTERN_MATCHED: ${{ steps.patterns.outputs.matched }}
        run: |
          # Validate diff size
          FILES_CHANGED=$(git diff --name-only | wc -l | tr -d ' ')
          LINES_CHANGED=$(git diff --numstat | awk '{s+=$1+$2}END{print s+0}')

          if [ "$FILES_CHANGED" -gt 5 ]; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "reason=Diff too large: ${FILES_CHANGED} files (max 5)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$LINES_CHANGED" -gt 100 ]; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "reason=Diff too large: ${LINES_CHANGED} lines (max 100)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Configure git
          git config user.name "CTO Agent"
          git config user.email "cto-agent@storscale.ai"

          # Determine pattern name
          PATTERN=$(node -e "try{const d=JSON.parse(require('fs').readFileSync('../pattern-result.json','utf8'));console.log(d.result?.patternName||'claude-code')}catch{console.log('claude-code')}" 2>/dev/null || echo "claude-code")

          # Stage changes (explicit files only, not git add -A)
          git diff --name-only | xargs git add

          COMMIT_MSG="[cto-fix] Auto-fix CI failure in ${TARGET_WORKFLOW}

          Pattern: ${PATTERN}
          Files changed: ${FILES_CHANGED}
          Run: https://github.com/${TARGET_REPO}/actions/runs/${TARGET_RUN_ID}

          Co-Authored-By: CTO Agent <cto-agent@storscale.ai>"

          git commit -m "$COMMIT_MSG"

          # T1.5: Pattern-matched fixes push to main, novel fixes open PR
          if [ "$PATTERN_MATCHED" = "true" ]; then
            # High-confidence pattern match → push directly to main
            git push origin HEAD
            echo "pushed=true" >> "$GITHUB_OUTPUT"
            echo "method=direct" >> "$GITHUB_OUTPUT"
          else
            # Novel fix (Claude Code freeform) → push to branch + open PR
            BRANCH="cto-fix/${TARGET_RUN_ID}"
            git checkout -b "$BRANCH"
            git push origin "$BRANCH"

            PR_URL=$(gh pr create \
              --repo "${TARGET_REPO}" \
              --base main \
              --head "$BRANCH" \
              --title "[cto-fix] Auto-fix CI failure in ${TARGET_WORKFLOW}" \
              --body "Automated fix by CTO Agent (Claude Code freeform analysis).

          **Pattern:** ${PATTERN}
          **Files changed:** ${FILES_CHANGED}
          **Original failure:** https://github.com/${TARGET_REPO}/actions/runs/${TARGET_RUN_ID}

          > This fix was generated by AI and requires human review before merging." \
              --no-maintainer-edit 2>&1 || echo "PR creation failed")

            echo "pushed=true" >> "$GITHUB_OUTPUT"
            echo "method=pr" >> "$GITHUB_OUTPUT"
            echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
          fi

          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "files_changed=${FILES_CHANGED}" >> "$GITHUB_OUTPUT"
          echo "pattern=${PATTERN}" >> "$GITHUB_OUTPUT"

      # ── Escalation (tests failed or no changes) ─────────────────
      - name: Handle escalation
        if: steps.loop-guard.outputs.skip != 'true' && steps.test-fix.outputs.tests_passed != 'true'
        id: escalation
        run: |
          echo "pushed=false" >> "$GITHUB_OUTPUT"
          echo "reason=${{ steps.test-fix.outputs.reason }}" >> "$GITHUB_OUTPUT"

      # ── Slack Notification ──────────────────────────────────────
      - name: Notify Slack
        if: always() && steps.loop-guard.outputs.skip != 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PUSHED: ${{ steps.push.outputs.pushed }}
          PUSH_METHOD: ${{ steps.push.outputs.method }}
          PUSH_REASON: ${{ steps.push.outputs.reason || steps.escalation.outputs.reason || steps.test-fix.outputs.reason }}
          COMMIT_SHA: ${{ steps.push.outputs.commit }}
          FILES_COUNT: ${{ steps.push.outputs.files_changed }}
          PATTERN: ${{ steps.push.outputs.pattern }}
          PR_URL: ${{ steps.push.outputs.pr_url }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then exit 0; fi

          RUN_URL="https://github.com/${TARGET_REPO}/actions/runs/${TARGET_RUN_ID}"

          if [ "$PUSHED" = "true" ] && [ "$PUSH_METHOD" = "direct" ]; then
            SHORT_SHA="${COMMIT_SHA:0:7}"
            MSG="CTO Agent fixed CI failure in *${TARGET_REPO}* (pattern: ${PATTERN})\nCommit: \`${SHORT_SHA}\` | Files: ${FILES_COUNT} | Pushed to main\n<${RUN_URL}|View original failure>"
            COLOR="good"
          elif [ "$PUSHED" = "true" ] && [ "$PUSH_METHOD" = "pr" ]; then
            MSG="CTO Agent created PR for *${TARGET_REPO}* (novel fix, needs review)\nFiles: ${FILES_COUNT}\n<${PR_URL}|Review PR> | <${RUN_URL}|View failure>"
            COLOR="#439FE0"
          else
            REASON="${PUSH_REASON}"
            MSG="CTO Agent could not auto-fix *${TARGET_REPO}*\nReason: ${REASON}\n<${RUN_URL}|View failure>"
            COLOR="danger"
          fi

          PAYLOAD=$(jq -n --arg text "$MSG" --arg color "$COLOR" \
            '{attachments: [{color: $color, text: $text}]}')
          curl -s -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' -d "$PAYLOAD"
